<!-- Modal overlay -->
<div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50"
     onclick="if(event.target===this)document.getElementById('modal-container').innerHTML=''">
  <div class="bg-white dark:bg-gray-800 rounded-xl shadow-2xl w-96 p-6" onclick="event.stopPropagation()">
    <!-- Header -->
    <div class="flex items-center justify-between mb-5">
      <h2 class="text-base font-medium text-gray-800 dark:text-gray-100">新增账号</h2>
      <button onclick="document.getElementById('modal-container').innerHTML=''"
              class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 transition-colors">
        <i class="ti ti-x text-lg"></i>
      </button>
    </div>

    <!-- Error -->
    {% if error %}
    <div class="mb-4 px-3 py-2 bg-red-50 dark:bg-red-950/40 border border-red-200 dark:border-red-800 rounded-lg text-sm text-red-600 dark:text-red-400">
      {{ error }}
    </div>
    {% endif %}

    <!-- Form -->
    <form hx-post="/accounts"
          hx-target="#modal-container"
          hx-swap="innerHTML">
      <div class="space-y-4">
        <div>
          <label class="block text-xs font-medium text-gray-500 dark:text-gray-400 mb-1">公司名称 <span class="text-red-400">*</span></label>
          <input type="text" name="company" required
                 value="{{ form.company if form else '' }}"
                 placeholder="如：浙江光明塑料机械有限公司"
                 class="w-full px-3 py-2 text-sm rounded-lg border border-gray-200 dark:border-gray-600
                        bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-100
                        focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-500 dark:text-gray-400 mb-1">账号 <span class="text-red-400">*</span></label>
          <input type="text" name="username" required
                 value="{{ form.username if form else '' }}"
                 placeholder="登录账号"
                 class="w-full px-3 py-2 text-sm rounded-lg border border-gray-200 dark:border-gray-600
                        bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-100 font-mono
                        focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-500 dark:text-gray-400 mb-1">密码 <span class="text-red-400">*</span></label>
          <input type="password" name="password" required
                 placeholder="登录密码"
                 class="w-full px-3 py-2 text-sm rounded-lg border border-gray-200 dark:border-gray-600
                        bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-100
                        focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-500 dark:text-gray-400 mb-1">联系人</label>
          <input type="text" name="contact"
                 value="{{ form.contact if form else '' }}"
                 placeholder="可选"
                 class="w-full px-3 py-2 text-sm rounded-lg border border-gray-200 dark:border-gray-600
                        bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-100
                        focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
      </div>

      <!-- Buttons -->
      <div class="flex justify-end gap-2 mt-6">
        <button type="button"
                onclick="document.getElementById('modal-container').innerHTML=''"
                class="px-4 py-2 text-sm rounded-lg border border-gray-200 dark:border-gray-600
                       text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
          取消
        </button>
        <button type="submit"
                class="px-4 py-2 text-sm rounded-lg bg-blue-600 hover:bg-blue-700 text-white transition-colors">
          保存账号
        </button>
      </div>
    </form>
  </div>
</div>
