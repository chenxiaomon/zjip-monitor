<div id="pwd-{{ username }}" class="flex items-center gap-1 mt-1">
  <span id="pwd-text-{{ username }}" class="font-mono text-xs blur-sm select-none transition-all duration-150">{{ password }}</span>
  <button type="button"
          onclick="var s=document.getElementById('pwd-text-{{ username }}');s.classList.toggle('blur-sm');s.classList.toggle('select-none');"
          class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 cursor-pointer">
    <i class="ti ti-eye text-sm"></i>
  </button>
</div>
