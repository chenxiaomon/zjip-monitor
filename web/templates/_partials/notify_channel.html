{% set c = ch_cfg or {} %}
<div id="channel-{{ channel }}" class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg p-5">
  <div class="flex items-center justify-between mb-4">
    <div class="flex items-center gap-2">
      {% if channel == 'dingtalk' %}<i class="ti ti-brand-dingtalk text-xl text-blue-500"></i><span class="font-medium text-sm text-gray-800 dark:text-gray-100">钉钉</span>
      {% elif channel == 'wechat' %}<i class="ti ti-brand-wechat text-xl text-green-500"></i><span class="font-medium text-sm text-gray-800 dark:text-gray-100">企业微信</span>
      {% else %}<i class="ti ti-mail text-xl text-gray-500"></i><span class="font-medium text-sm text-gray-800 dark:text-gray-100">邮件</span>
      {% endif %}
    </div>
    {% if saved %}<span class="text-xs text-green-600 dark:text-green-400"><i class="ti ti-check"></i> 已保存</span>{% endif %}
  </div>

  <form hx-post="/notify/{{ channel }}"
        hx-target="#channel-{{ channel }}"
        hx-swap="outerHTML"
        class="space-y-3">
    <!-- Enabled toggle -->
    <label class="flex items-center gap-2 cursor-pointer">
      <input type="checkbox" name="enabled" value="on" {% if c.get('enabled') %}checked{% endif %}
             class="w-4 h-4 rounded accent-blue-600">
      <span class="text-sm text-gray-700 dark:text-gray-200">启用该渠道</span>
    </label>

    {% if channel in ('dingtalk', 'wechat') %}
    <div>
      <label class="block text-xs text-gray-500 dark:text-gray-400 mb-1">Webhook URL</label>
      <input type="url" name="webhook" value="{{ c.get('webhook', '') }}"
             class="w-full px-3 py-2 text-xs rounded border border-gray-200 dark:border-gray-600
                    bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-100
                    focus:outline-none focus:ring-1 focus:ring-blue-500">
    </div>
    {% if channel == 'dingtalk' %}
    <div>
      <label class="block text-xs text-gray-500 dark:text-gray-400 mb-1">签名密钥（可选）</label>
      <input type="text" name="secret" value="{{ c.get('secret', '') }}"
             class="w-full px-3 py-2 text-xs rounded border border-gray-200 dark:border-gray-600
                    bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-100
                    focus:outline-none focus:ring-1 focus:ring-blue-500">
    </div>
    {% endif %}

    {% else %}
    <!-- Email fields -->
    <div class="grid grid-cols-2 gap-3">
      <div>
        <label class="block text-xs text-gray-500 mb-1">SMTP 主机</label>
        <input type="text" name="smtp_host" value="{{ c.get('smtp_host', '') }}"
               class="w-full px-3 py-2 text-xs rounded border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-100 focus:outline-none focus:ring-1 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-xs text-gray-500 mb-1">端口</label>
        <input type="number" name="smtp_port" value="{{ c.get('smtp_port', 465) }}"
               class="w-full px-3 py-2 text-xs rounded border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-100 focus:outline-none focus:ring-1 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-xs text-gray-500 mb-1">用户名</label>
        <input type="text" name="smtp_user" value="{{ c.get('smtp_user', '') }}"
               class="w-full px-3 py-2 text-xs rounded border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-100 focus:outline-none focus:ring-1 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-xs text-gray-500 mb-1">密码</label>
        <input type="password" name="smtp_password" value="{{ c.get('smtp_password', '') }}"
               class="w-full px-3 py-2 text-xs rounded border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-100 focus:outline-none focus:ring-1 focus:ring-blue-500">
      </div>
    </div>
    <div>
      <label class="block text-xs text-gray-500 mb-1">发件人</label>
      <input type="email" name="from_addr" value="{{ c.get('from_addr', '') }}"
             class="w-full px-3 py-2 text-xs rounded border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-100 focus:outline-none focus:ring-1 focus:ring-blue-500">
    </div>
    <div>
      <label class="block text-xs text-gray-500 mb-1">收件人（多个用英文逗号分隔）</label>
      <input type="text" name="to_addrs" value="{{ c.get('to_addrs', '') }}"
             class="w-full px-3 py-2 text-xs rounded border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-100 focus:outline-none focus:ring-1 focus:ring-blue-500">
    </div>
    <label class="flex items-center gap-2">
      <input type="checkbox" name="use_tls" value="on" {% if c.get('use_tls', True) %}checked{% endif %} class="w-4 h-4 accent-blue-600">
      <span class="text-xs text-gray-700 dark:text-gray-200">使用 TLS</span>
    </label>
    {% endif %}

    <div class="pt-1">
      <button type="submit"
              class="px-4 py-1.5 text-xs rounded bg-blue-600 hover:bg-blue-700 text-white transition-colors cursor-pointer">
        保存
      </button>
    </div>
  </form>
</div>
