<div id="gen-status"
     {% if gen_status.status == 'running' %}
     hx-get="/reports/gen-status"
     hx-trigger="every 3s"
     hx-swap="outerHTML"
     {% endif %}
     class="flex items-center gap-2 text-sm">
  {% if gen_status.status == 'running' %}
  <span class="w-2.5 h-2.5 rounded-full bg-blue-500 animate-pulse inline-block"></span>
  <span class="text-blue-600 dark:text-blue-400">生成中，请稍候…</span>
  {% elif gen_status.status == 'error' %}
  <span class="text-red-500"><i class="ti ti-alert-circle"></i> 生成失败：{{ gen_status.msg }}</span>
  {% endif %}
</div>
