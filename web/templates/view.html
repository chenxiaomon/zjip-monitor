<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登记状态 — 数智通监控</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <script>
    (function(){var s=localStorage.getItem('dark'),m=window.matchMedia('(prefers-color-scheme:dark)').matches;if(s==='1'||(s===null&&m))document.documentElement.classList.add('dark');})();
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class'}</script>
  <link rel="stylesheet" href="/static/tabler-icons.min.css">
  <link rel="stylesheet" href="/static/app.css">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen font-sans">

  <!-- Top bar -->
  <header class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 px-6 py-3 flex items-center justify-between">
    <div class="flex items-center gap-2">
      <i class="ti ti-database text-blue-500 text-lg"></i>
      <span class="text-sm font-medium text-gray-700 dark:text-gray-200">数智通监控</span>
      <span class="ml-2 px-2 py-0.5 rounded text-xs bg-gray-100 dark:bg-gray-700 text-gray-500 dark:text-gray-400">只读</span>
    </div>
    <button onclick="document.documentElement.classList.toggle('dark');localStorage.setItem('dark',document.documentElement.classList.contains('dark')?'1':'0')"
            class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200">
      <i class="ti ti-sun-moon text-lg"></i>
    </button>
  </header>

  <main class="max-w-4xl mx-auto p-6">
    {% include "_partials/view_content.html" %}
  </main>

</body>
</html>
